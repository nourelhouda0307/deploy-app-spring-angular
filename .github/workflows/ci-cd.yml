name: CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests
        working-directory: springboot/app
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Spring Boot image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app
      - name: Build Angular image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
      - name: Push Spring Boot image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest
      - name: Push Spring Boot image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Push Angular image          # ← AJOUTER CES 2 LIGNES
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
